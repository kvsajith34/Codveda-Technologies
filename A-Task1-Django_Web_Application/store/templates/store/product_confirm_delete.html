{% extends "base.html" %}
{% block title %}Delete Product{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-danger">
      <div class="card-body text-center p-4">
        <i class="bi bi-trash3-fill text-danger" style="font-size:3rem"></i>
        <h4 class="mt-3">Delete "{{ product.name }}"?</h4>
        <p class="text-muted">This action cannot be undone.</p>
        <form method="post" class="d-flex gap-2 justify-content-center">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Yes, Delete</button>
          <a href="{% url 'store:admin_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
