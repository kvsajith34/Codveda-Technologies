{% extends "base.html" %}
{% block title %}Register — ShopSite{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="mb-4 text-center">Create an Account</h2>
        <form method="post" novalidate>
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
              <input
                type="{{ field.field.widget.input_type }}"
                name="{{ field.html_name }}"
                id="{{ field.id_for_label }}"
                class="form-control {% if field.errors %}is-invalid{% endif %}"
                value="{{ field.value|default:'' }}"
                {% if field.field.required %}required{% endif %}
              >
              {% for error in field.errors %}
                <div class="invalid-feedback">{{ error }}</div>
              {% endfor %}
            </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        <p class="text-center mt-3 mb-0">Already have an account? <a href="{% url 'accounts:login' %}">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
