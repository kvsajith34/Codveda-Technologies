{% extends "base.html" %}
{% block title %}Password Changed{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 text-center">
    <div class="card shadow-sm p-4">
      <i class="bi bi-shield-check-fill text-success" style="font-size:3rem"></i>

    </div>
  </div>
</div>
{% endblock %}
