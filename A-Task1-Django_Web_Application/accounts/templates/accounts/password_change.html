{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="mb-3">Change Password</h2>
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label fw-semibold">{{ field.label }}</label>
              <input type="password" name="{{ field.html_name }}"
                class="form-control {% if field.errors %}is-invalid{% endif %}" required>
              {% for error in field.errors %}<div class="invalid-feedback">{{ error }}</div>{% endfor %}
            </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary">Update Password</button>
          <a href="{% url 'accounts:profile' %}" class="btn btn-link">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
