{% extends "base.html" %}
{% block title %}Email Sent{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 text-center">
    <div class="card shadow-sm p-4">
      <i class="bi bi-envelope-check-fill text-success" style="font-size:3rem"></i>
      <h3 class="mt-3">Check your email</h3>
      <p class="text-muted">If an account exists for that email, a reset link has been sent. Check your inbox (and spam folder).</p>
      <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
